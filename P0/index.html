<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>One Lodha Place | Air Quality Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--text-grey:#646464;
--status-green:#45A631;
--card-bg:rgba(255,255,255,0.3);
--sensor-bg:rgba(255,255,255,0.7);
}

body,html{
margin:0;
height:100vh;
width:100vw;
font-family:'Inter',sans-serif;
background:url('bg.jpg') no-repeat center center fixed;
background-size:cover;
overflow:hidden;
display:flex;
align-items:center;
}

.dashboard-container{
display:flex;
width:100%;
height:100%;
padding:0 8vw;
align-items:center;
justify-content:space-between;
}

.text-panel{
flex:0 0 55%;
}

.live-tag{
font-size:3vh;
font-weight:500;
text-transform:uppercase;
color:#646464;
margin-bottom:4vh;
}

.headline{
font-size:6vh;
color:#646464;
white-space:nowrap;
}

.status-word{
font-weight:600;
color:#45A631;
}

.cards-panel{
flex:0 0 28vw;
display:flex;
flex-direction:column;
align-items:flex-end;
gap:4vh;
transform:translateX(20%);
}

.card{
background:var(--card-bg);
backdrop-filter:blur(20px);
width:50vh;
height:50vh;
padding:3vh 2vw;
border-radius:3.5vh;
text-align:center;
}

.location-label{
font-size:3vh;
font-weight:600;
text-transform:uppercase;
margin-bottom:3vh;
color:#646464;
}

.aqi-number{
font-size:13vh;
font-weight:200;
color:#646464;
}

.metrics-grid{
display:flex;
background:var(--sensor-bg);
border-radius:2.5vh;
margin-top:3vh;
padding:2vh 0;
}

.metric-block{
flex:1;
text-align:center;
}

.m-label{
font-size:2.5vh;
}

.m-val{
font-size:3vh;
}

.metric-unit{
font-size:2vh;
margin-left:4px;
}

.v-divider{
width:1px;
background:#ddd;
}

</style>
</head>

<body>

<div class="dashboard-container">

<div class="text-panel">

<div class="live-tag">

Live AQI  
<span id="last-update"></span>

</div>

<h1 class="headline">

Indoor air quality is  
<span id="status-text" class="status-word">Excellent</span>

</h1>

</div>


<div class="cards-panel">


<div class="card">

<div class="location-label">

One Lodha Place

</div>

<div id="in-aqi" class="aqi-number">

--

</div>

<div class="metrics-grid">

<div class="metric-block">

<div class="m-label">PM2.5</div>

<div class="m-val">

<span id="in-pm25">--</span>

</div>

</div>

<div class="v-divider"></div>

<div class="metric-block">

<div class="m-label">PM10</div>

<div class="m-val">

<span id="in-pm10">--</span>

</div>

</div>

</div>

</div>



<div class="card">

<div class="location-label">

Worli (CPCB)

</div>

<div id="out-aqi" class="aqi-number">

--

</div>

<div class="metrics-grid">

<div class="metric-block">

<div class="m-label">PM2.5</div>

<div class="m-val">

<span id="out-pm25">--</span>

</div>

</div>

<div class="v-divider"></div>

<div class="metric-block">

<div class="m-label">PM10</div>

<div class="m-val">

<span id="out-pm10">--</span>

</div>

</div>

</div>

</div>


</div>

</div>


<script>

const K_KEY='nomjPNZHYkGzzP5YIJePqI2cUON67v1pj9JPXb8BpcgnC5VX';

const DEVICE_IDS=[
'0d7dab01-e1c1-42f2-b266-9bd80694e4a1',
'db410241-f3de-401e-a569-473de7c0ceb3',
'910d75c5-eedd-4e0c-b4f3-38436eb7aab8'
];

const WAQI_TOKEN="demo";   // Works instantly


function calcAQI(pm){

if(pm<=30) return Math.round(pm*50/30);
if(pm<=60) return Math.round(50+(pm-30)*(50/30));
if(pm<=90) return Math.round(100+(pm-60)*(100/30));
if(pm<=120) return Math.round(200+(pm-90)*(100/30));

return 300;

}



async function updateData(){

try{

let inAQI=0;
let outAQI=0;


/* Indoor Sensors */

const fetches=DEVICE_IDS.map(id=>

fetch(`https://api.kaiterra.com/v1/devices/${id}/top?key=${K_KEY}`)
.then(r=>r.json())

);

const results=await Promise.all(fetches);

let pm25=[];
let pm10=[];

results.forEach(r=>{

const d=r.data;

const p25=d.find(x=>x.param==='rpm25c');

const p10=d.find(x=>x.param==='rpm10c');

if(p25) pm25.push(p25.points[0].value);

if(p10) pm10.push(p10.points[0].value);

});


if(pm25.length>0){

const avg25=Math.round(pm25.reduce((a,b)=>a+b)/pm25.length);

const avg10=Math.round(pm10.reduce((a,b)=>a+b)/pm10.length);

inAQI=calcAQI(avg25);

document.getElementById('in-aqi').innerText=inAQI;

document.getElementById('in-pm25').innerHTML=

avg25+'<span class="metric-unit"> µg/m³</span>';

document.getElementById('in-pm10').innerHTML=

avg10+'<span class="metric-unit"> µg/m³</span>';

}


/* CPCB Outdoor AQI */

const wRes=await fetch(

`https://api.waqi.info/feed/worli/?token=${WAQI_TOKEN}`

);

const wData=await wRes.json();


if(wData.status=="ok"){

outAQI=wData.data.aqi;

document.getElementById('out-aqi').innerText=outAQI;


if(wData.data.iaqi.pm25){

document.getElementById('out-pm25').innerHTML=

Math.round(wData.data.iaqi.pm25.v)+

'<span class="metric-unit"> µg/m³</span>';

}

if(wData.data.iaqi.pm10){

document.getElementById('out-pm10').innerHTML=

Math.round(wData.data.iaqi.pm10.v)+

'<span class="metric-unit"> µg/m³</span>';

}

}


/* Status */

const st=document.getElementById('status-text');

st.innerText=

inAQI<=15?"PRISTINE":

inAQI<=30?"EXCEPTIONAL":

inAQI<=45?"EXCELLENT":

inAQI<=60?"VERY GOOD":"GOOD";


document.getElementById('last-update').innerText=

" | Updated "+new Date().toLocaleTimeString();


}catch(e){

console.log(e);

}

}


updateData();

setInterval(updateData,60000);


</script>

</body>
</html>
